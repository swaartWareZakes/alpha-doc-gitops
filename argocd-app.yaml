apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alphadoc-production
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/swaartWareZakes/alpha-doc-gitops.git'
    targetRevision: main
    path: k8s 
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextjs-ui
  namespace: alpha-frontend  # <--- FIXED
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nextjs-ui
  template:
    metadata:
      labels:
        app: nextjs-ui
    spec:
      containers:
      - name: nextjs-ui
        image: acralphadocaiprod.azurecr.io/nextjs-ui:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: nextjs-ui-svc
  namespace: alpha-frontend  # <--- FIXED
spec:
  selector:
    app: nextjs-ui
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: LoadBalancer